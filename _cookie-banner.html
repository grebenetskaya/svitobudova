<!-- Cookie Banner (shared across all pages) -->
<div id="cookieBanner" class="cookie-banner" role="dialog" aria-label="Cookie consent" aria-live="polite">
  <p class="cookie-text">
    We use cookies to improve your experience and analyze site traffic. See our <a href="privacy.html">Privacy Policy</a> for details. This banner is for demonstration purposes; no actual tracking is implemented.
  </p>
  <div class="cookie-actions">
    <button id="declineCookies" class="btn btn-ghost" style="padding:8px 18px;font-size:0.75rem;">Decline</button>
    <button id="acceptCookies" class="btn btn-primary" style="padding:8px 18px;font-size:0.75rem;">Accept All</button>
  </div>
</div>
